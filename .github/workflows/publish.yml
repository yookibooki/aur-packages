name: Update AUR packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_release]

concurrency:
  group: aur-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: mpatch-bin
            upstream: Romelium/mpatch
          # - pkg: some-other-pkg
          #   upstream: SomeAuthor/some-repo

    steps:
      - name: System dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel git openssh jq curl

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up AUR SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m700 ~/.ssh
          install -m600 /dev/stdin ~/.ssh/aur <<< "$AUR_SSH_KEY"
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: "Check and update ${{ matrix.pkg }}"
        id: upd
        working-directory: ${{ matrix.pkg }}
        run: |
          set -euo pipefail

          # makepkg/updpkgsums refuse to run as root — create a build user
          if ! id builduser &>/dev/null; then
            useradd -m builduser
            printf 'builduser ALL=(ALL) NOPASSWD: ALL\n' >> /etc/sudoers
          fi
          chown -R builduser:builduser "$PWD"

          latest=$(curl -fsSL \
            "https://api.github.com/repos/${{ matrix.upstream }}/releases/latest" \
            | jq -r '.tag_name | sub("^v";"")')
          [[ -n "$latest" ]] || { echo "ERROR: empty version"; exit 1; }

          current=$(source PKGBUILD && echo "$pkgver")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          if [[ "$latest" == "$current" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "${{ matrix.pkg }}: $current -> $latest"

          # Bump version
          sed -i "s/^pkgver=.*/pkgver=$latest/; s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Let updpkgsums download sources and update checksums canonically
          sudo -u builduser updpkgsums

          # Regenerate .SRCINFO via makepkg — canonical, avoids hand-rolling
          sudo -u builduser makepkg --printsrcinfo > .SRCINFO

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: "Push ${{ matrix.pkg }} to AUR"
        if: steps.upd.outputs.changed == 'true'
        env:
          GIT_SSH_COMMAND: ssh -o IdentitiesOnly=yes -i ~/.ssh/aur
        run: |
          set -euo pipefail
          pkg="${{ matrix.pkg }}"
          tmp="$(mktemp -d)"

          git clone "ssh://aur@aur.archlinux.org/${pkg}.git" "$tmp"
          cp "${pkg}/PKGBUILD" "${pkg}/.SRCINFO" "$tmp/"

          cd "$tmp"
          git add PKGBUILD .SRCINFO
          git commit -m "${pkg}: update to v${{ steps.upd.outputs.latest }}"
          git push

          rm -rf "$tmp"

      - name: Commit back to monorepo
        if: steps.upd.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pkg="${{ matrix.pkg }}"
          git add "${pkg}/PKGBUILD" "${pkg}/.SRCINFO"
          git commit -m "${pkg}: update to v${{ steps.upd.outputs.latest }}"
          git push origin main
