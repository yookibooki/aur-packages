name: Update AUR packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_release]

jobs:
  update:
    concurrency:
      group: aur-${{ matrix.pkg }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: mpatch-bin
            upstream: Romelium/mpatch
            asset: mpatch # explicit, avoids ${pkg%-bin} guess
            ext: .tar.gz
            ver_in_url: true
            ver_in_path: true
            archs: |
              x86_64 x86_64-unknown-linux-gnu
              aarch64 aarch64-unknown-linux-gnu
              armv7h armv7-unknown-linux-gnueabihf

          - pkg: umadev-bin
            upstream: umacloud/umadev
            asset: umadev
            ext: ""
            ver_in_url: false
            ver_in_path: true
            archs: |
              x86_64 x86_64-unknown-linux-gnu
              aarch64 aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: "Check ${{ matrix.pkg }}"
        id: check
        run: |
          set -euo pipefail
          cd "${{ matrix.pkg }}"
          latest=$(gh release view -R "${{ matrix.upstream }}" --json tagName --jq '.tagName | sub("^v";"")')
          [[ -n "$latest" && "$latest" != "null" ]] || exit 1
          current=$(bash -c 'source PKGBUILD; echo $pkgver')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          [[ "$latest" != "$current" ]] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up AUR SSH
        if: steps.check.outputs.changed == 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m700 ~/.ssh
          install -m600 /dev/stdin ~/.ssh/aur_key <<< "$AUR_SSH_KEY"
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: "Update PKGBUILD"
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Delegate to the shared script — see scripts/update-pkgbuild.sh
          scripts/update-pkgbuild.sh \
            "${{ matrix.pkg }}" \
            "${{ steps.check.outputs.latest }}" \
            "${{ matrix.asset }}" \
            '${{ matrix.ext }}' \
            '${{ matrix.ver_in_url }}' \
            '${{ matrix.ver_in_path }}' \
            "${{ matrix.upstream }}" \
            <<< '${{ matrix.archs }}'

      - name: Cache archlinux docker image
        id: cache-docker
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@v6
        with:
          path: /tmp/archlinux-docker.tar
          key: docker-archlinux-base-devel

      - name: Load cached docker image
        if: steps.check.outputs.changed == 'true'
        run: |
          if [ -f /tmp/archlinux-docker.tar ]; then
            echo "Loading docker image from cache..."
            docker load < /tmp/archlinux-docker.tar
          fi

      - name: "Generate .SRCINFO"
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd "${{ matrix.pkg }}"
          # generate to temp, only replace if different (saves a git commit on reruns)
          # makepkg refuses to run as root — run as the host uid so the
          # mounted workdir is writable
          docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -v "$PWD:/w" archlinux:base-devel bash -c "cd /w && makepkg --printsrcinfo" > .SRCINFO.new
          if ! cmp -s .SRCINFO .SRCINFO.new 2>/dev/null; then mv .SRCINFO.new .SRCINFO; else rm .SRCINFO.new; fi

      - name: "Push to AUR"
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pkg="${{ matrix.pkg }}"
          tmp=$(mktemp -d); trap 'rm -rf "$tmp"' EXIT
          git clone --depth 1 "ssh://aur@aur.archlinux.org/${pkg}.git" "$tmp"
          cp "${pkg}/PKGBUILD" "${pkg}/.SRCINFO" "$tmp/"
          cd "$tmp"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "${pkg}: update to v${{ steps.check.outputs.latest }}"
          git push

      - name: Commit back
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git add "${{ matrix.pkg }}/PKGBUILD" "${{ matrix.pkg }}/.SRCINFO"
          git diff --cached --quiet || git commit -m "${{ matrix.pkg }}: update to v${{ steps.check.outputs.latest }}"
          git push origin main
