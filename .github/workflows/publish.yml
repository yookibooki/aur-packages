name: Update AUR packages

on:
  repository_dispatch:
    types: [new_release]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "yookibooki"
          git config user.email "rendogust@gmail.com"

      - name: Set up SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur_key
            StrictHostKeyChecking no
          EOF

      # ============================================================
      # mpatch-bin
      # ============================================================
      - name: "mpatch-bin: Check for update"
        id: mpatch
        run: |
          PKG="mpatch-bin"
          UPSTREAM="Romelium/mpatch"
          cd "$PKG"

          latest=$(curl -sL "https://api.github.com/repos/${UPSTREAM}/releases/latest" | \
            jq -r '.tag_name | sub("^v"; "")')
          current=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)

          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "current=${current}" >> "$GITHUB_OUTPUT"

          if [ "$latest" = "$current" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "${PKG}: already at ${current}"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "${PKG}: ${current} -> ${latest}"
          fi

      - name: "mpatch-bin: Update PKGBUILD"
        if: steps.mpatch.outputs.updated == 'true'
        run: |
          PKG="mpatch-bin"
          cd "$PKG"
          NEW_VER="${{ steps.mpatch.outputs.latest }}"

          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          for entry in "x86_64 x86_64-unknown-linux-gnu" \
                       "aarch64 aarch64-unknown-linux-gnu" \
                       "armv7h armv7-unknown-linux-gnueabihf"; do
            read -r arch triple <<< "$entry"

            url="https://github.com/Romelium/mpatch/releases/download/v${NEW_VER}/mpatch-${triple}-v${NEW_VER}.tar.gz"
            fname="mpatch-${NEW_VER}-${triple}.tar.gz"

            curl -sL "$url" -o "/tmp/${fname}"
            checksum=$(sha256sum "/tmp/${fname}" | cut -d' ' -f1)
            rm -f "/tmp/${fname}"

            sed -i "s|^source_${arch}=.*|source_${arch}=(\"mpatch-\${pkgver}-${triple}.tar.gz::https://github.com/Romelium/mpatch/releases/download/v\${pkgver}/mpatch-${triple}-v\${pkgver}.tar.gz\")|" PKGBUILD
            sed -i "s|^sha256sums_${arch}=.*|sha256sums_${arch}=('${checksum}')|" PKGBUILD
          done

      - name: "mpatch-bin: Generate .SRCINFO"
        if: steps.mpatch.outputs.updated == 'true'
        run: |
          PKG="mpatch-bin"
          cd "$PKG"
          source PKGBUILD

          cat > .SRCINFO << EOF
          pkgbase = ${pkgname}
          $(echo "${pkgdesc}" | sed 's/^/\tpkgdesc = /')
          $(echo "${pkgver}" | sed 's/^/\tpkgver = /')
          $(echo "${pkgrel}" | sed 's/^/\tpkgrel = /')
          $(echo "${url}" | sed 's/^/\turl = /')
          $(for a in "${arch[@]}"; do echo "\tarch = ${a}"; done)
          $(for l in "${license[@]}"; do echo "\tlicense = ${l}"; done)
          $(echo "${provides}" | sed 's/^/\tprovides = /')
          $(echo "${conflicts}" | sed 's/^/\tconflicts = /')
          $(for arch in x86_64 aarch64 armv7h; do
            src_var="source_${arch}[@]"
            sha_var="sha256sums_${arch}[@]"
            for s in "${!src_var}"; do echo "\tsource_${arch} = ${s}"; done
            for s in "${!sha_var}"; do echo "\tsha256sums_${arch} = ${s}"; done
          done)

          pkgname = ${pkgname}
          EOF

      - name: "mpatch-bin: Push to AUR"
        if: steps.mpatch.outputs.updated == 'true'
        run: |
          PKG="mpatch-bin"
          VERSION="${{ steps.mpatch.outputs.latest }}"

          # Clone AUR repo into temp dir
          TMP_DIR=$(mktemp -d)
          git clone "ssh://aur@aur.archlinux.org/${PKG}.git" "$TMP_DIR"

          # Copy updated files
          cp "${PKG}/PKGBUILD" "${PKG}/.SRCINFO" "$TMP_DIR/"

          # Commit and push
          cd "$TMP_DIR"
          git add PKGBUILD .SRCINFO
          git commit -m "${PKG}: update to v${VERSION}"
          git push origin master

          # Clean up
          rm -rf "$TMP_DIR"

      # ============================================================
      # Next package: copy block above, adjust steps.mpatch -> steps.<id>
      # ============================================================

      - name: Commit monorepo and push to GitHub
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto: update packages"
            git push origin main
          fi
