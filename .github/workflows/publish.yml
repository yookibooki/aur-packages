name: Update AUR packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_release]

concurrency:
  group: aur-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: mpatch-bin
            upstream: Romelium/mpatch
            archs: |
              x86_64 x86_64-unknown-linux-gnu
              aarch64 aarch64-unknown-linux-gnu
              armv7h armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up AUR SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m700 ~/.ssh
          install -m600 /dev/stdin ~/.ssh/aur_key <<< "$AUR_SSH_KEY"
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: "Check ${{ matrix.pkg }} for update"
        id: check
        run: |
          set -euo pipefail
          cd "${{ matrix.pkg }}"

          latest=$(curl -fsSL \
            "https://api.github.com/repos/${{ matrix.upstream }}/releases/latest" \
            | jq -r '.tag_name | sub("^v";"")')
          [[ -n "$latest" ]] || { echo "ERROR: empty version"; exit 1; }

          current=$(. ./PKGBUILD && echo "$pkgver")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          if [[ "$latest" == "$current" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.pkg }}: already at $current"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.pkg }}: $current -> $latest"

      - name: "Update PKGBUILD for ${{ matrix.pkg }}"
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd "${{ matrix.pkg }}"
          VERSION="${{ steps.check.outputs.latest }}"

          sed -i "s/^pkgver=.*/pkgver=$VERSION/; s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          while read -r arch triple; do
            [[ -z "$arch" ]] && continue
            url="https://github.com/${{ matrix.upstream }}/releases/download/v${VERSION}/mpatch-${triple}-v${VERSION}.tar.gz"
            fname="mpatch-${VERSION}-${triple}.tar.gz"

            echo "  downloading ${fname}..."
            curl -fsSL "$url" -o "/tmp/${fname}"
            [[ -s "/tmp/${fname}" ]] || { echo "Download failed for ${arch}"; exit 1; }

            checksum=$(sha256sum "/tmp/${fname}" | cut -d' ' -f1)
            rm -f "/tmp/${fname}"

            sed -i "s|^source_${arch}=.*|source_${arch}=(\"mpatch-\${pkgver}-${triple}.tar.gz::https://github.com/${{ matrix.upstream }}/releases/download/v\${pkgver}/mpatch-${triple}-v\${pkgver}.tar.gz\")|" PKGBUILD
            sed -i "s|^sha256sums_${arch}=.*|sha256sums_${arch}=('${checksum}')|" PKGBUILD
          done <<< "${{ matrix.archs }}"

      - name: "Generate .SRCINFO for ${{ matrix.pkg }}"
        if: steps.check.outputs.changed == 'true'
        run: |
          # Use Arch container just for the canonical .SRCINFO generation.
          # Runs only on actual updates (~1s container startup once cached).
          docker run --rm \
            -v "$PWD/${{ matrix.pkg }}:/w" \
            archlinux:base-devel \
            bash -c "cd /w && makepkg --printsrcinfo > .SRCINFO"

      - name: "Push ${{ matrix.pkg }} to AUR"
        if: steps.check.outputs.changed == 'true'
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=accept-new
        run: |
          set -euo pipefail
          pkg="${{ matrix.pkg }}"
          tmp="$(mktemp -d)"

          git clone "ssh://aur@aur.archlinux.org/${pkg}.git" "$tmp"
          cp "${pkg}/PKGBUILD" "${pkg}/.SRCINFO" "$tmp/"

          cd "$tmp"
          git add PKGBUILD .SRCINFO
          git commit -m "${pkg}: update to v${{ steps.check.outputs.latest }}"
          git push

          rm -rf "$tmp"

      - name: Commit back to monorepo
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pkg="${{ matrix.pkg }}"
          git add "${pkg}/PKGBUILD" "${pkg}/.SRCINFO"
          git commit -m "${pkg}: update to v${{ steps.check.outputs.latest }}"
          git push origin main
