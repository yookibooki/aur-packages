name: Update AUR packages

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Build matrix
        id: set-matrix
        run: echo "matrix=$(cat .github/packages.json)" >> "$GITHUB_OUTPUT"

  update:
    needs: setup
    concurrency:
      group: aur-${{ matrix.pkg }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: "Check ${{ matrix.pkg }}"
        id: check
        run: |
          set -euo pipefail
          cd "${{ matrix.pkg }}"
          latest=$(gh release view -R "${{ matrix.upstream }}" --json tagName --jq '.tagName | sub("^v";"")')
          [[ -n "$latest" && "$latest" != "null" ]] || exit 1
          current=$(bash -c 'source PKGBUILD; echo ${_realver:-$pkgver}')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          [[ "$latest" != "$current" ]] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: "Update PKGBUILD"
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          scripts/update-pkgbuild.sh \
            "${{ matrix.pkg }}" \
            "${{ steps.check.outputs.latest }}" \
            "${{ matrix.asset }}" \
            '${{ matrix.ext }}' \
            '${{ matrix.ver_in_url }}' \
            "${{ matrix.upstream }}" \
            '${{ matrix.ver_in_path }}' \
            '${{ matrix.version_in_asset }}' \
            <<< '${{ matrix.archs }}'

      - name: Upload updated PKGBUILD
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pkgbuild-${{ matrix.pkg }}
          path: ${{ matrix.pkg }}/PKGBUILD
          retention-days: 1

  finalize:
    needs: [setup, update]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download updated PKGBUILDs
        uses: actions/download-artifact@v4
        with:
          pattern: pkgbuild-*

      - name: Check for changes
        id: any-changed
        run: |
          any=false
          for dir in pkgbuild-*/; do
            [ -d "$dir" ] || continue
            any=true
            break
          done
          echo "changed=$any" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: steps.any-changed.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up AUR SSH
        if: steps.any-changed.outputs.changed == 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${AUR_SSH_KEY:?AUR_SSH_KEY secret is not set — aborting}"
          install -d -m700 ~/.ssh
          install -m600 /dev/stdin ~/.ssh/aur_key <<< "$AUR_SSH_KEY"
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: "Generate .SRCINFO and push to AUR"
        if: steps.any-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Copy updated PKGBUILDs into the checkout
          for dir in pkgbuild-*/; do
            [ -d "$dir" ] || continue
            pkg="${dir#pkgbuild-}"
            pkg="${pkg%/}"
            cp "$dir/PKGBUILD" "$pkg/PKGBUILD"
          done
          # Single Docker container to generate all .SRCINFO files
          docker run --rm -v "$PWD:/w" archlinux:base-devel bash -c '
            set -euo pipefail
            for dir in /w/pkgbuild-*/; do
              [ -d "$dir" ] || continue
              pkg="${dir#/w/pkgbuild-}"
              pkg="${pkg%/}"
              cd "/w/$pkg"
              makepkg --printsrcinfo > .SRCINFO
            done
          '
          # Push each changed package to AUR
          for dir in pkgbuild-*/; do
            [ -d "$dir" ] || continue
            pkg="${dir#pkgbuild-}"
            pkg="${pkg%/}"
            version=$(bash -c "cd '$pkg'; source PKGBUILD; echo \$pkgver")
            tmp=$(mktemp -d)
            git clone --depth 1 "ssh://aur@aur.archlinux.org/${pkg}.git" "$tmp"
            cp "${pkg}/PKGBUILD" "${pkg}/.SRCINFO" "$tmp/"
            cd "$tmp"
            git add PKGBUILD .SRCINFO
            git diff --cached --quiet || git commit -m "${pkg}: update to v${version}"
            git push
            rm -rf "$tmp"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Commit back
        if: steps.any-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          for dir in pkgbuild-*/; do
            [ -d "$dir" ] || continue
            pkg="${dir#pkgbuild-}"
            pkg="${pkg%/}"
            git add "$pkg/PKGBUILD" "$pkg/.SRCINFO"
          done
          git diff --cached --quiet || git commit -m "AUR packages: daily update"
          git push origin main
