name: Verify PKGBUILD sources

on:
  push:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Source PKGBUILD
        run: |
          set -euo pipefail
          cd mpatch-bin
          bash -c 'source PKGBUILD; echo "$pkgver"'
